<!doctype html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/><meta name="theme-color" content="#111827"/><link rel="manifest" href="manifest.webmanifest"/><link rel="stylesheet" href="style.css"/><title>Pro Angular Chapter Launcher</title><style>.shell{max-width:1040px;margin:0 auto;padding:24px 16px 48px}.toolbar{position:sticky;top:0;z-index:5;padding:12px 0;backdrop-filter:blur(18px);background:rgba(11,16,32,.78)}input{width:100%;border:1px solid rgba(255,255,255,.16);border-radius:18px;padding:15px 16px;font-size:17px;background:rgba(255,255,255,.08);color:#fff;outline:none}.grid{display:grid;gap:14px;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));margin-top:18px}.tile{min-height:172px;display:flex;flex-direction:column;justify-content:space-between;padding:16px;border-radius:26px;background:linear-gradient(145deg,rgba(255,255,255,.14),rgba(255,255,255,.06));border:1px solid rgba(255,255,255,.15);color:inherit;text-decoration:none;box-shadow:0 14px 35px rgba(0,0,0,.22)}.num{font-size:34px;font-weight:800;letter-spacing:-.06em}.title{font-size:15px;color:#e2e8f0;line-height:1.25;margin-top:8px}.launch{color:#bfdbfe;font-weight:800;font-size:14px}</style></head><body><main class="shell"><h1>Pro Angular<br/>Interactive Chapters</h1><p class="lede">Browse the Angular book as a mobile-friendly static learning site. Every chapter has explanations, runnable StackBlitz examples, and direct source links.</p><div class="toolbar"><input id="search" placeholder="Search chapters…" autocomplete="off"/></div><section id="grid" class="grid"></section></main><script>const chapters=[['01','Jumping Right In'],['03','Primer 1'],['04','Primer 2'],['05','SportsStore'],['06','SportsStore 2'],['07','SportsStore 3'],['08','SportsStore 4'],['09','Angular Projects and Tools'],['10','Using Data Bindings'],['12','Using Events and Forms'],['15','Creating Components'],['17','Using Services'],['20','Creating the Example Project'],['21','Using the Forms API'],['23','HTTP Requests'],['24','URL Routing'],['25','URL Routing 2'],['26','URL Routing 3'],['27','Animations'],['28','Component Libraries'],['29','Unit Testing']];const grid=document.getElementById('grid');const search=document.getElementById('search');function render(q=''){grid.innerHTML='';chapters.filter(c=>!q||`${c[0]} ${c[1]}`.toLowerCase().includes(q.toLowerCase())).forEach(c=>{const a=document.createElement('a');a.className='tile';a.href=`chapter.html?id=${c[0]}`;a.innerHTML=`<div><div class="num">${c[0]}</div><div class="title">${c[1]}</div></div><div class="launch">Open chapter →</div>`;grid.appendChild(a);});}search.addEventListener('input',e=>render(e.target.value));render();</script></body></html>
